user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Log format: include real client IP even behind a proxy ────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" upstream=$upstream_addr '
                      'rt=$request_time uct=$upstream_connect_time';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # ── Gzip compression (reduces JS/CSS/JSON payload by ~70%) ───────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   5;
    gzip_proxied      expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/ttf
        font/opentype
        application/vnd.ms-fontobject;

    # ── Real-IP passthrough from Docker bridge network ────────────────────────
    real_ip_header     X-Forwarded-For;
    set_real_ip_from   172.16.0.0/12;   # Docker internal subnet

    include /etc/nginx/conf.d/*.conf;
}
