# ─────────────────────────────────────────────────────────────────────────────
# HTTP-Only Configuration — Development / Pre-certificate Staging
#
# NXT Health Suite domain architecture:
#   app.nxthealthsuite.com         → HMS admin panel + API
#   *.app.nxthealthsuite.com       → per-tenant subdomains (lahore, karachi …)
#
# For production, use reverse-proxy-https.conf (deploy.sh activates it
# automatically after Let's Encrypt wildcard cert is obtained).
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    # catch-all: handles app.nxthealthsuite.com AND *.app.nxthealthsuite.com
    # (wildcards are only supported on a real domain in HTTPS mode)
    server_name _;

    # Security headers (basic — no HSTS on plain HTTP)
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # File upload size limit (matches backend 50 MB limit)
    client_max_body_size 50M;

    # Timeouts for long-running requests
    proxy_connect_timeout  60s;
    proxy_send_timeout     120s;
    proxy_read_timeout     120s;

    # ── Static images (tenant-isolated: /images/<tenant_id>/<file>) ──────────
    location /images/ {
        alias /usr/share/nginx/html/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Legacy path alias kept for older frontend builds
    location /file-server/ {
        alias /usr/share/nginx/html/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Backend API (/api-server/) ────────────────────────────────────────────
    location /api-server/ {
        proxy_pass http://hospital-apis:80;
        proxy_set_header Host               $host;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Patient portal (/portal/) ─────────────────────────────────────────────
    location /portal/ {
        proxy_pass http://patient-frontend:80;
        proxy_set_header Host               $host;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
    }

    # ── Admin panel SPA (fallback to index.html for Angular routing) ──────────
    location / {
        proxy_pass http://hospital-frontend:80;
        proxy_set_header Host               $host;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
    }

    # ── Internal health check ─────────────────────────────────────────────────
    location /nginx-health {
        access_log  off;
        return 200  "nginx OK\n";
        add_header  Content-Type text/plain;
    }
}
